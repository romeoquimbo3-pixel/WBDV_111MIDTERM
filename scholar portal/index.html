<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarPortal | Edu-Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <div class="login-box">
            <h2>ScholarPortal</h2>
            <p>Identity-First: Please enter your Student ID</p>
            <div class="input-group">
                <input type="text" id="studentId" placeholder="Student ID" required>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button onclick="handleLogin()">Login</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Invalid Student ID</p>
        </div>
    </div>

    <div id="dashboard" class="dashboard-container" style="display: none;">
        <header>
            <h1>Edu-Tech</h1>
            <nav>
                <a href="#" onclick="showSection('courses')">Courses</a>
                <a href="#" onclick="showSection('register')">Register</a>
                <a href="#" onclick="showSection('profile')">Profile</a>
                <a href="#" class="logout" onclick="logout()">Logout</a>
            </nav>
        </header>

        <main class="cards">
            <div class="card">
                <h3>Transcript</h3>
                <p>Access your official academic records.</p>
                <button>Download PDF</button>
            </div>
            <div id="dynamic-content" class="card">
                <h3>Welcome!</h3>
                <p>Select a menu item to get started.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
