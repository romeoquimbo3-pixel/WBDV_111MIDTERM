<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayRoll Edge - Corporate Payroll Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">PayRoll Edge</h1>
            <nav>
                <ul>
                    <li><button onclick="showAlert('Dashboard')">Dashboard</button></li>
                    <li><button onclick="showAlert('Employees')">Employees</button></li>
                    <li><button onclick="showAlert('Reports')">Reports</button></li>
                    <li><button onclick="showAlert('Settings')">Settings</button></li>
                    <li><button onclick="showAlert('Logout')" class="btn-primary">Logout</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="main-grid">
                
                <div class="card security-card">
                    <div class="security-status">
                        <h2>Secure Access</h2>
                        <p class="status-indicator">● Active</p>
                    </div>
                    <div class="security-icons">
                        <div class="icon-block" onclick="showAlert('Facial Recognition Requested')">
                            <div class="face-id-graphic">
                                <div class="face-outline"></div>
                                <div class="eye-dots"></div>
                            </div>
                            <span>FaceID</span>
                        </div>
                        <div class="icon-block" onclick="showAlert('Fingerprint Recognition Requested')">
                            <div class="fingerprint-graphic">
                                <div class="print-lines"></div>
                            </div>
                            <span>Fingerprint</span>
                        </div>
                    </div>
                    <p class="security-meta">Corporate Solid Security Enabled</p>
                </div>

                <div class="admin-actions">
                    <h2>Corporate Payroll Control</h2>
                    <p>Select a task category to proceed.</p>
                    
                    <div class="action-grid">
                        <button class="action-btn" onclick="showAlert('Opening Staff Directory')">Staff, Timesheets, Payslips</button>
                        <button class="action-btn" onclick="showAlert('Opening Tax Overview')">Tax View</button>
                        <button class="action-btn" onclick="showAlert('Initializing Corporate Settings')">Corporate</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 PayRoll Edge Inc. </p>
        </div>
    </footer>

    <script>
        function showAlert(featureName) {
            alert(featureName + " feature requested.");
        }
    </script>
</body>
</html>
