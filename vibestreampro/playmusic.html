<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Video Player</title>
    <style>
        /* CSS: DESIGN NG PLAYER */
        :root {
            --primary-color: #1db954; /* Spotify Green */
            --bg-color: #121212;
            --card-bg: #181818;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-container {
            background-color: var(--card-bg);
            width: 350px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .video-wrapper {
            width: 100%;
            height: 200px;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .song-info h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .song-info p {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
        }

        .btn:hover {
            color: var(--primary-color);
        }

        .play-btn {
            background-color: var(--primary-color);
            color: black;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background-color: #1ed760;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 5px;
            background-color: #535353;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .progress {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #b3b3b3;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="player-container">
       
        <div class="video-wrapper">

            <video id="mainVideo" src="misssobad.mp4"></video>
        </div>

       
        <div class="song-info">
            <h2>MSBY Music Video</h2>
            <p>skusta clee</p>
        </div>

        
        <div class="controls">
            <button class="btn" onclick="skipBack()">⏪</button>
            <button class="btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="btn" onclick="skipForward()">⏩</button>
        </div>

      
        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <script>
       
        const video = document.getElementById('mainVideo');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        // Play/Pause Function
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = "⏸"; // Pause symbol
            } else {
                video.pause();
                playBtn.innerHTML = "▶"; // Play symbol
            }
        }

        // Update Progress Bar
        function updateProgress() {
            const { duration, currentTime } = video;
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;

            // Update Time Display
            currentTimeEl.innerText = formatTime(currentTime);
            if(duration) {
                durationEl.innerText = formatTime(duration);
            }
        }

        // Set Progress on Click
        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = video.duration;
            video.currentTime = (clickX / width) * duration;
        }

        // Format Time (Seconds to Minutes:Seconds)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Skip Back/Forward
        function skipBack() { video.currentTime -= 5; }
        function skipForward() { video.currentTime += 5; }

        // Event Listeners
        video.addEventListener('timeupdate', updateProgress);
        progressContainer.addEventListener('click', setProgress);
        video.addEventListener('ended', () => {
            playBtn.innerHTML = "▶";
            progress.style.width = "0%";
        });

    </script>
</body>
</html>
