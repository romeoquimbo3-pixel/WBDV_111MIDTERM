<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Stream - Home</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #1db954; /* Green */
            --secondary-color: #191414; /* Dark Background */
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
            --dark-gray: #282828;
            --light-gray: #535353;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--secondary-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: #000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .logo-icon {
            font-size: 32px;
            color: var(--primary-color);
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 0;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-color);
        }

        .nav-links i {
            font-size: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            background: linear-gradient(180deg, #222 0%, var(--secondary-color) 100%);
            overflow-y: auto;
            padding: 20px 40px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            background: #fff;
            border-radius: 500px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            width: 300px;
        }

        .search-bar input {
            border: none;
            outline: none;
            margin-left: 10px;
            width: 100%;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 500px;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(45deg, #440a6b, #920ba8);
            padding: 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .hero-info h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 500px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Song List */
        .section-title {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .song-card {
            background-color: var(--dark-gray);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
        }

        .song-card:hover {
            background-color: var(--light-gray);
        }

        .song-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .song-card h3 {
            font-size: 16px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .play-icon-overlay {
            position: absolute;
            right: 20px;
            bottom: 110px;
            background: var(--primary-color);
            color: #000;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .song-card:hover .play-icon-overlay {
            opacity: 1;
            transform: translateY(-5px);
        }

        /* Bottom Player */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background-color: var(--dark-gray);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .song-info {
            display: flex;
            align-items: center;
            width: 30%;
        }

        .song-info img {
            width: 56px;
            height: 56px;
            margin-right: 15px;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .control-buttons i {
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
        }

        .control-buttons i:hover {
            color: #fff;
        }

        .play-pause-btn {
            color: #fff !important;
            font-size: 32px !important;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: #535353;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress {
            width: 0%;
            height: 100%;
            background-color: #fff;
            border-radius: 2px;
            position: relative;
            transition: width 0.1s;
        }
        
        .progress-bar:hover .progress {
            background-color: var(--primary-color);
        }

        .volume-controls {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .volume-controls i {
            color: var(--text-muted);
            margin-right: 10px;
        }

        .volume-bar {
            width: 100px;
            height: 4px;
            background-color: #535353;
            border-radius: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .hero h1 { font-size: 2rem; }
            .search-bar { display: none; }
        }
    </style>
</head>
