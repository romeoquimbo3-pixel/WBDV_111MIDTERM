<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna Vista Resort Reservation</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #0d1b2a;
    color: #fff;
    margin: 0;
    padding: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0;
  }
  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }
  .image-slider {
    flex: 1 1 45%;
    background-color: #121a23;
    padding: 16px 16px 24px 16px;
    border: 1px solid #2a3441;
    border-radius: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .slides-wrapper {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 16 / 10;
    background-color: #000;
  }
  .slide {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .slide.active {
    display: block;
    animation: fade 0.4s ease-in-out;
  }
  @keyframes fade {
    from { opacity: 0.8; }
    to { opacity: 1; }
  }
  .nav-button {
    cursor: pointer;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 60px;
    background-color: rgba(90, 95, 105, 0.82);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease;
    z-index: 10;
  }
  .nav-button svg {
    width: 28px;
    height: 28px;
  }
  .nav-button.prev {
    left: 20px;
  }
  .nav-button.next {
    right: 20px;
  }
  .nav-button:hover {
    background-color: rgba(110, 115, 125, 0.95);
  }
  .dots-container {
    margin-top: 24px;
    display: flex;
    gap: 12px;
  }
  .dot {
    cursor: pointer;
    height: 14px;
    width: 14px;
    background-color: #8c96a3;
    border-radius: 50%;
    transition: background-color 0.2s ease;
  }
  .dot.active {
    background-color: #f7ca74;
  }
  .dot:hover:not(.active) {
    background-color: #a8b2bf;
  }
  .reservation-form {
    flex: 1 1 45%;
    background-color: #1b263b;
    padding: 20px;
    border-radius: 8px;
  }
  .reservation-form h2 {
    margin-top: 0;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 6px;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  select {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 4px;
  }
  button {
    background-color: #e63946;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #d90429;
  }
</style>
</head>
<body>

<header>
  <h1>Luna Vista Resort</h1>
</header>

<div class="container">
  <div class="image-slider">
    <div class="slides-wrapper">
      <img src="Deluxe King Room.WEBP" alt="Deluxe King Room" class="slide active">
      <img src="Ocean Suite.JPG" alt="Ocean Suite" class="slide"> 
      <img src="Presidential Penthouse.JPG" alt="Presidential Penthouse" class="slide">
      
      <div class="nav-button prev" onclick="changeSlide(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </div>
      <div class="nav-button next" onclick="changeSlide(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </div>
    <div class="dots-container">
      <span class="dot active" onclick="currentSlide(0)"></span>
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
    </div>
  </div>

  <div class="reservation-form">
  
    <h2>Reservation Form</h2>
    <form action="#" method="POST">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required />
      </div>
      <div class="form-group">
        <label for="checkin">Check-In Date</label>
        <input type="date" id="checkin" name="checkin" required />
      </div>
      <div class="form-group">
        <label for="checkout">Check-Out Date</label>
        <input type="date" id="checkout" name="checkout" required />
      </div>
      <div class="form-group">
        <label for="guests">Guests</label>
        <input type="number" id="guests" name="guests" min="1" required />
      </div>
      <div class="form-group">
        <label for="roomtype">Room Type</label>
        <select id="roomtype" name="roomtype" required>
          <option value="">Choose room</option>
          <option value="Deluxe King Room">Deluxe King Room</option>
          <option value="Ocean Suite">Ocean Suite</option>
          <option value="Presidential Penthouse">Presidential Penthouse</option>
        </select>
      </div>
      <button type="submit">Book Now</button>
    </form>
  </div>
</div>

<script>
  let slideIndex = 0; // eto yung current na nasa pic index 0 
  const slides = document.querySelectorAll('.slide'); // ito naman yung sineselect nya yung class nung pic
  const dots = document.querySelectorAll('.dot');

  function showSlide(n) {
    slides.forEach(slide => slide.classList.remove('active'));// ito yung pagtanggal ng current na index nireremove nya yung plus class +active
    dots.forEach(dot => dot.classList.remove('active'));
    
    slideIndex = (n + slides.length) % slides.length;
    
    slides[slideIndex].classList.add('active');
    dots[slideIndex].classList.add('active');
  }

  function changeSlide(n) {
    showSlide(slideIndex + n); // ito kada click nag iincrement yung index kaya nag nenext sa next pic
  }

  function currentSlide(n) {
    showSlide(n);
  }
</script>
</body>
</html>
