<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management | Binondo Furniture</title>
    <style>
        /* CSS STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            /* Nilagay ang image file name mo dito */
            background-image: url('binondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        header {
            background-color: #f4f1ea;
            padding: 15px 5%;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #ddd;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        /* Container */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .manage-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 2px;
        }

        .manage-card h1 {
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 25px;
            color: #222;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* Profile Preview */
        .profile-view {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            background: #fdfdfd;
        }

        input:disabled {
            background: #f1f1f1;
            color: #888;
        }

        /* Button Styling */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .edit-btn { background-color: #222; color: white; }
        .save-btn { background-color: #28a745; color: white; display: none; }
        .cancel-btn { background-color: #dc3545; color: white; display: none; }

        .btn:hover { opacity: 0.8; }

    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="index.html">ABOUT US</a></li>
                <li><a href="index.html">PRODUCT ▼</a></li>
                <li><a href="index.html">LOG IN / REGISTER ▼</a></li>
                <li><a href="index.html">CONTACT US</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="manage-card">
            <h1>ACCOUNT MANAGE</h1>

            <div class="profile-view">
                <div class="avatar" id="avatarIcon">RQ</div>
                <h2 id="viewName">Romeo Ducusin Quimbo</h2>
                <p id="viewEmail" style="color: #888; font-size: 14px;">romeoquimbo3@gmail.com</p>
            </div>

            <form id="accountForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="inputName" value="Romeo Ducusin Quimbo" disabled>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="inputEmail" value="romeoquimbo3@gmail.com" disabled>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="inputPhone" value="09 510 763 343" disabled>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="inputAddress" value="san baraquel homes gitna bignay valenzuela blik 2 lot8" disabled>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn edit-btn" id="editBtn">Edit Details</button>
                    <button type="button" class="btn cancel-btn" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn save-btn" id="saveBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const inputs = document.querySelectorAll('input');

        // Toggle Edit Mode
        editBtn.addEventListener('click', () => {
            inputs.forEach(input => input.disabled = false);
            editBtn.style.display = 'none';
            saveBtn.style.display = 'block';
            cancelBtn.style.display = 'block';
        });

        // Cancel Edit
        cancelBtn.addEventListener('click', () => {
            inputs.forEach(input => input.disabled = true);
            editBtn.style.display = 'block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
            // Pwedeng i-reset dito ang values kung gusto mo
        });

        // Save Changes
        document.getElementById('accountForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Kunin ang mga bagong value
            const name = document.getElementById('inputName').value;
            const email = document.getElementById('inputEmail').value;

            // I-update ang display sa taas
            document.getElementById('viewName').innerText = name;
            document.getElementById('viewEmail').innerText = email;
            
            // Palitan ang avatar initials (kunin ang unang letra ng first at last name)
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
            document.getElementById('avatarIcon').innerText = initials.substring(0, 2);

            // Lock ulit ang form
            inputs.forEach(input => input.disabled = true);
            editBtn.style.display = 'block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';

            alert("Details updated successfully!");
        });
    </script>

</body>
</html>
