<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>table</title>

<style> 
body { background-image: 
    url('images/bg.jpg');
    background-size: cover; }

header { background:black; color:gold; padding:15px; text-align:center; }

nav { background:#333; padding:10px; text-align:right; }
nav a, nav button {
    color:white; margin-right:15px; background:none;
    border:none; cursor:pointer; font-weight:bold;
}

.container { text-align:center; padding:20px; }

.card {
    background; width:220px; display:inline-block;
    margin:15px; padding:10px; border-radius:10px;
    box-shadow:0 0 10px gray; cursor:pointer;
}

.card img {
    width:100%; height:150px; object-fit:cover;
    border-radius:10px;
}

button.buy {
    background:green; color:white; border:none;
    padding:8px; width:100%; margin-top:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Cabinet Collection</h1>
</header>

<nav>
<a href="index.html">HOME</a>
<a href="cart.html">CART 🛒</a>
<button onclick="logout()">LOG OUT</button>
</nav>

<div class="container">

<div class="card" onclick="viewItem('parisian table')">
<img src="parisian.webp">
<h3>parisian table</h3>
<p>₱8000</p>
<button class="buy" onclick="addToCart(event,'parisian table',8000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('tokyo table')">
<img src="tokyo.jpg">
<h3>tokyo table</h3>
<p>₱10000</p>
<button class="buy" onclick="addToCart(event,'tokyo table',10000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('rose table')">
<img src="rose.webp">
<h3>rose table</h3>
<p>₱6000</p>
<button class="buy" onclick="addToCart(event,'rose table',6000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('lily table')">
<img src="lily.webp">
<h3>lily table</h3>
<p>₱6500</p>
<button class="buy" onclick="addToCart(event,'lily table',6500)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('wood table')">
<img src="wood table.jpg">
<h3>wood table</h3>
<p>₱5000</p>
<button class="buy" onclick="addToCart(event,'wood table',5000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('aesthetic table')">
<img src="aesthetic table.webp">
<h3>aesthetic table</h3>
<p>₱12000</p>
<button class="buy" onclick="addToCart(event,'aesthetic table',12000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('Modern table')">
<img src="modern table.jpg">
<h3>modern table</h3>
<p>₱23000</p>
<button class="buy" onclick="addToCart(event,'Modern table',23000)">Add to Cart</button>
</div>

<div class="card" onclick="viewItem('Classic table')">
<img src="classic.jpeg">
<h3>Classic table</h3>
<p>₱13000</p>
<button class="buy" onclick="addToCart(event,'Classic table',13000)">Add to Cart</button>
</div>

</div>

<script>
function logout(){
    alert("Logged out!");
    window.location.href="index.html";
}

function viewItem(name){
    alert("Viewing: " + name);
}

function addToCart(event,name,price){
    event.stopPropagation();

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({name:name, price:price});

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart!");
}
</script>

</body>
</html>
